<!doctype html>
<html lang="en">
  <head>

      content="Basic boilerplate for Zeina Envyte project"

    <div id="loadingScreen" role="status" aria-live="polite" aria-atomic="true">
      <div class="loading-card">
        <div id="loadingMessage">please wait, something special is loading</div>
        <div class="loading-dots" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>
    <header>
      <h1></h1>
    </header>

    <main>
      <!-- <p>Welcome — this is a minimal HTML5 boilerplate.</p> -->
      <canvas id="myCanvas"></canvas>
      <canvas id="myCanvasFront"></canvas>
    </main>

    <footer>
      <!-- <p>&copy; <span id="year"></span> Zeina Envyte</p> -->
    </footer>

    <!-- Scripts -->
    <script src="manual_templates.registry.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@7.4.3/dist/pixi.min.js" defer></script>
    <script src="script_11_flowers.js" defer></script>
    <script src="script_11.js" defer></script>
    <script src="
https://cdn.jsdelivr.net/npm/noisejs@2.1.0/index.min.js
"></script>
    <script>
      // Set current year in footer
      const yearEl = document.getElementById("year");
      if (yearEl) {
        yearEl.textContent = String(new Date().getFullYear());
      }
    </script>
  </body>
